{% extends 'base.html' %}
{% block title %}New Test{% endblock %}
{% block topbar_title %}New Test Series{% endblock %}
{% block content %}
<div class="form-panel">
  <form method="post">
    <div class="form-section">
      <div class="form-group">
        <label>Glaze *</label>
        <select name="glaze_id" required>
          <option value="">Select a glaze…</option>
          {% for glaze in glazes %}
          <option value="{{ glaze.id }}" {% if preselected_glaze and glaze.id|string == preselected_glaze %}selected{% endif %}>#{{ glaze.studio_number }} — {{ glaze.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Test Name *</label>
        <input type="text" name="name" required placeholder="e.g. Rutile + Zircopax Progression">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Test Type</label>
          <select name="test_type">
            <option value="wet_progression">Wet Progression</option>
            <option value="discrete_batch">Discrete Batch</option>
          </select>
        </div>
        <div class="form-group">
          <label>Base Batch Size (g)</label>
          <input type="number" name="base_batch_size" value="100" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4" placeholder="Goal, variables, what to look for…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('tests') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Test</button>
    </div>
  </form>
</div>
{% endblock %}
