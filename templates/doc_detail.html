{% extends 'base.html' %}
{% block title %}{{ doc.title }}{% endblock %}
{% block topbar_title %}{{ doc.title }}{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('edit_doc', doc_id=doc.id) }}" class="btn btn-ghost">Edit</a>
  <form method="post" action="{{ url_for('delete_doc', doc_id=doc.id) }}" style="display:inline" onsubmit="return confirm('Delete this doc?')">
    <button class="btn btn-danger" type="submit">Delete</button>
  </form>
{% endblock %}

{% block content %}
<iframe
  id="doc-frame"
  src="{{ url_for('render_doc', doc_id=doc.id) }}"
  style="width:100%;border:none;min-height:600px;display:block;"
  scrolling="no"
></iframe>
{% endblock %}

{% block scripts %}
<script>
window.addEventListener('message', function(e) {
  if (e.data && e.data.iframeHeight) {
    document.getElementById('doc-frame').style.height = (e.data.iframeHeight + 40) + 'px';
  }
});
</script>
{% endblock %}
