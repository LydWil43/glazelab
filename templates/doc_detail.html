{% extends 'base.html' %}
{% block title %}{{ doc.title }}{% endblock %}
{% block topbar_title %}{{ doc.title }}{% endblock %}
{% block topbar_actions %}
  <a href="{{ url_for('edit_doc', doc_id=doc.id) }}" class="btn btn-ghost">Edit</a>
  <form method="post" action="{{ url_for('delete_doc', doc_id=doc.id) }}" style="display:inline" onsubmit="return confirm('Delete this doc?')">
    <button class="btn btn-danger" type="submit">Delete</button>
  </form>
{% endblock %}

{% block content %}
<div class="doc-body">
  {{ doc.content | safe }}
</div>
{% endblock %}

{% block scripts %}
<script>
const DOC_ID = {{ doc.id }};
const SAVED_STATES = {{ states | tojson }};

document.addEventListener('DOMContentLoaded', () => {
  const boxes = document.querySelectorAll('.doc-body input[type="checkbox"]');
  boxes.forEach((cb, i) => {
    // Apply saved state
    if (SAVED_STATES[String(i)]) cb.checked = true;
    // Save on change
    cb.addEventListener('change', () => {
      fetch(`/docs/${DOC_ID}/checkboxes`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index: i, checked: cb.checked})
      });
    });
  });
});
</script>
{% endblock %}
